
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KochaEats — Reset Password</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1a237e 0%,#283593 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{color:#ff6b35;font-size:1.4rem;font-weight:700;margin-bottom:28px;display:flex;align-items:center;gap:10px}
.logo i{font-size:1.6rem}
.card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.card-title{font-size:1.2rem;font-weight:700;color:#1a237e;margin-bottom:6px}
.card-sub{font-size:.82rem;color:#888;margin-bottom:24px}
.step{display:none}.step.active{display:block}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:#555;margin-bottom:5px}
.input-wrap{position:relative}
.input-wrap i.icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa;font-size:.9rem}
.input-wrap input{width:100%;padding:11px 12px 11px 36px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.85rem;outline:none;transition:border .2s}
.input-wrap input:focus{border-color:#1a237e}
.input-wrap .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;font-size:.85rem;background:none;border:none;padding:0}
.btn{width:100%;padding:12px;border-radius:8px;border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-primary{background:linear-gradient(135deg,#1a237e,#283593);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,35,126,.35)}
.btn-primary:disabled{background:#ccc;transform:none;box-shadow:none;cursor:not-allowed}
.btn-link{background:none;border:none;color:#1a237e;font-size:.82rem;cursor:pointer;font-family:'Poppins',sans-serif;padding:0;text-decoration:underline}
.msg{padding:10px 14px;border-radius:8px;font-size:.8rem;margin-bottom:14px;display:none}
.msg.show{display:flex;align-items:center;gap:8px}
.msg-error{background:#ffebee;color:#c62828}
.msg-success{background:#e8f5e9;color:#2e7d32}
.msg-info{background:#e3f2fd;color:#1565c0}
.strength-bar{height:4px;border-radius:2px;background:#e0e0e0;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.strength-label{font-size:.7rem;margin-top:3px;color:#888}
.steps-nav{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.step-dot{width:10px;height:10px;border-radius:50%;background:#e0e0e0;transition:background .3s}
.step-dot.active{background:#1a237e}
.step-dot.done{background:#27ae60}
.success-icon{width:72px;height:72px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#27ae60;margin:0 auto 18px}
.back-link{text-align:center;margin-top:18px;font-size:.8rem;color:#888}
.back-link a{color:#1a237e;text-decoration:none;font-weight:500}
.back-link a:hover{text-decoration:underline}
.token-box{background:#f8f9ff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;font-size:.75rem;color:#555;word-break:break-all;margin-bottom:14px}
.token-box strong{color:#1a237e;display:block;margin-bottom:4px}
</style>
</head>
<body>
<div class="logo"><i class="fas fa-utensils"></i> KochaEats</div>

<div class="card">
  <div class="steps-nav">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- STEP 1: Request Reset -->
  <div class="step active" id="step1">
    <div class="card-title" id="step1-title"><i class="fas fa-lock" style="color:#ff6b35"></i> Forgot Password?</div>
    <div class="card-sub" id="step1-sub">Enter your email address or phone number to receive a reset link.</div>
    <div class="msg msg-error" id="s1-error"><i class="fas fa-exclamation-circle"></i><span></span></div>
    <div class="form-group">
      <label id="identifier-label">Email or Phone Number</label>
      <div class="input-wrap">
        <i class="icon fas fa-user"></i>
        <input type="text" id="reset-email" placeholder="email@example.com or +251..." autocomplete="email">
      </div>
    </div>
    <button class="btn btn-primary" id="s1-btn" onclick="requestReset()">
      <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>
    <div class="back-link"><a href="kochaEats.html"><i class="fas fa-arrow-left"></i> Back to Login</a></div>
  </div>

  <!-- STEP 2: Enter New Password -->
  <div class="step" id="step2">
    <div class="card-title"><i class="fas fa-key" style="color:#ff6b35"></i> Set New Password</div>
    <div class="card-sub">Choose a strong password for your account.</div>
    <div class="msg msg-error" id="s2-error"><i class="fas fa-exclamation-circle"></i><span></span></div>
    <div class="form-group">
      <label>New Password</label>
      <div class="input-wrap">
        <i class="icon fas fa-lock"></i>
        <input type="password" id="new-pw" placeholder="Min 8 chars, uppercase, number" oninput="checkStrength(this.value)">
        <button class="toggle-pw" onclick="togglePw('new-pw',this)" type="button"><i class="fas fa-eye"></i></button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label">Enter a password</div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <i class="icon fas fa-lock"></i>
        <input type="password" id="confirm-pw" placeholder="Repeat your password">
        <button class="toggle-pw" onclick="togglePw('confirm-pw',this)" type="button"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <button class="btn btn-primary" id="s2-btn" onclick="resetPassword()">
      <i class="fas fa-check-circle"></i> Reset Password
    </button>
  </div>

  <!-- STEP 3: Success -->
  <div class="step" id="step3">
    <div class="success-icon"><i class="fas fa-check"></i></div>
    <div class="card-title" style="text-align:center">Password Reset!</div>
    <div class="card-sub" style="text-align:center;margin-bottom:20px">Your password has been updated successfully. You can now log in with your new password.</div>
    <button class="btn btn-primary" onclick="goToLogin()">
      <i class="fas fa-sign-in-alt"></i> Go to Login
    </button>
  </div>
</div>

<script>
const API = 'http://localhost:3000';
let resetToken = null;

// Check if token is in URL (coming from email link)
const urlParams = new URLSearchParams(window.location.search);
const urlToken  = urlParams.get('token');
const urlRole   = urlParams.get('role') || 'customer'; // rider, admin, customer

// Set page subtitle based on role
const roleLabels = { rider: 'Rider Account', admin: 'Admin Account', customer: 'Customer Account' };
const roleIcons  = { rider: 'fa-motorcycle', admin: 'fa-shield-alt', customer: 'fa-user' };
document.querySelector('.card-sub').textContent = 'Reset password for your ' + (roleLabels[urlRole] || 'account');

// Update title with role icon
const titleEl = document.getElementById('step1-title');
if (titleEl) titleEl.innerHTML = '<i class="fas ' + (roleIcons[urlRole]||'fa-lock') + '" style="color:#ff6b35"></i> Forgot Password?';

// Role-specific placeholder
const inputEl = document.getElementById('reset-email');
if (inputEl) {
    if (urlRole === 'rider') inputEl.placeholder = 'Rider email (e.g. yonas.rider@gmail.com)';
    else if (urlRole === 'admin') inputEl.placeholder = 'Admin email (e.g. admin@kochaeats.com)';
}

if (urlToken) {
    verifyTokenFromUrl(urlToken);
}

function setDot(step) {
    [1,2,3].forEach(i => {
        const d = document.getElementById('dot'+i);
        d.classList.remove('active','done');
        if (i < step) d.classList.add('done');
        else if (i === step) d.classList.add('active');
    });
}

function showStep(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step'+n).classList.add('active');
    setDot(n);
}

function showError(id, msg) {
    const el = document.getElementById(id);
    el.querySelector('span').textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
}

function togglePw(id, btn) {
    const input = document.getElementById(id);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.innerHTML = '<i class="fas fa-eye'+(isText?'':'-slash')+'"></i>';
}

function checkStrength(pw) {
    const fill  = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let score = 0;
    if (pw.length >= 8)  score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const levels = [
        { w:'0%',   bg:'#e0e0e0', txt:'Enter a password' },
        { w:'20%',  bg:'#e74c3c', txt:'Very weak' },
        { w:'40%',  bg:'#e67e22', txt:'Weak' },
        { w:'60%',  bg:'#f39c12', txt:'Fair' },
        { w:'80%',  bg:'#27ae60', txt:'Strong' },
        { w:'100%', bg:'#1a237e', txt:'Very strong' },
    ];
    const l = levels[score] || levels[0];
    fill.style.width = l.w;
    fill.style.background = l.bg;
    label.textContent = l.txt;
    label.style.color = l.bg;
}

function goToLogin() {
    // Redirect to correct login based on role
    window.location.href = 'kochaEats.html';
}

// Step 1: Request reset
async function requestReset() {
    const identifier = document.getElementById('reset-email').value.trim();
    if (!identifier) { showError('s1-error','Please enter your email or phone number.'); return; }
    const btn = document.getElementById('s1-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

    // Determine if email or phone
    const payload = identifier.includes('@') ? { email: identifier } : { phone: identifier };

    try {
        const r = await fetch(API+'/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const d = await r.json();
        if (!d.success) throw new Error(d.message);

        if (d.dev_token) {
            // DEV MODE: show token and proceed directly to step 2
            resetToken = d.dev_token;

            // Replace step 1 content with token display + proceed button
            document.getElementById('step1').innerHTML = `
              <div style="text-align:center;margin-bottom:18px">
                <div style="width:60px;height:60px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#27ae60;margin:0 auto 12px">
                  <i class="fas fa-check-circle"></i>
                </div>
                <div style="font-size:1rem;font-weight:700;color:#1a237e;margin-bottom:4px">Reset Link Generated!</div>
                <div style="font-size:.8rem;color:#888">Hi ${d.user_name||'there'} — your reset token is ready.</div>
              </div>
              <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:14px;margin-bottom:14px">
                <div style="font-size:.72rem;font-weight:600;color:#f57f17;margin-bottom:6px"><i class="fas fa-info-circle"></i> DEV MODE — In production this would be sent via email/SMS</div>
                <div style="font-size:.75rem;color:#555;word-break:break-all;margin-bottom:8px"><strong>Token:</strong> ${d.dev_token}</div>
                <a href="${d.dev_reset_url}" style="font-size:.75rem;color:#1a237e;word-break:break-all"><strong>Reset URL:</strong> ${d.dev_reset_url}</a>
              </div>
              <div style="font-size:.75rem;color:#888;margin-bottom:16px"><i class="fas fa-clock"></i> Expires in: ${d.expires_in}</div>
              <button class="btn btn-primary" onclick="showStep(2)">
                <i class="fas fa-arrow-right"></i> Continue to Set New Password
              </button>
              <div class="back-link" style="margin-top:14px"><a href="kochaEats.html"><i class="fas fa-arrow-left"></i> Back to Login</a></div>`;
        } else {
            // Production: show "check your email/phone" message
            document.getElementById('step1').innerHTML = `
              <div style="text-align:center">
                <div style="width:60px;height:60px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#27ae60;margin:0 auto 14px">
                  <i class="fas fa-envelope"></i>
                </div>
                <div style="font-size:1rem;font-weight:700;color:#1a237e;margin-bottom:6px">Check Your ${identifier.includes('@')?'Email':'Phone'}</div>
                <div style="font-size:.82rem;color:#666;margin-bottom:20px">We sent a reset link to <strong>${identifier}</strong>. Check your ${identifier.includes('@')?'inbox':'messages'} and click the link.</div>
                <div style="font-size:.78rem;color:#888;margin-bottom:16px">Didn't receive it? <button class="btn-link" onclick="window.location.reload()">Try again</button></div>
              </div>
              <div class="back-link"><a href="kochaEats.html"><i class="fas fa-arrow-left"></i> Back to Login</a></div>`;
        }
    } catch(e) {
        showError('s1-error', e.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
    }
}

// Verify token from URL (email link click)
async function verifyTokenFromUrl(token) {
    try {
        const r = await fetch(API+'/api/auth/verify-reset-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
        });
        const d = await r.json();
        if (!d.success) {
            document.getElementById('step1').innerHTML = '<div class="msg msg-error show" style="margin-bottom:16px"><i class="fas fa-exclamation-circle"></i><span>This reset link is invalid or has expired. Please request a new one.</span></div><button class="btn btn-primary" onclick="window.location.href=\'reset-password.html\'"><i class="fas fa-redo"></i> Request New Link</button>';
            return;
        }
        resetToken = token;
        document.querySelector('.card-sub').textContent = 'Resetting password for: '+d.data.email;
        showStep(2);
    } catch(e) {
        console.error('Token verify error:', e);
    }
}

// Step 2: Reset password
async function resetPassword() {
    const newPw  = document.getElementById('new-pw').value;
    const confPw = document.getElementById('confirm-pw').value;
    if (!newPw || !confPw) { showError('s2-error','Please fill in both password fields.'); return; }
    if (newPw !== confPw)  { showError('s2-error','Passwords do not match.'); return; }
    if (newPw.length < 8)  { showError('s2-error','Password must be at least 8 characters.'); return; }
    if (!/[A-Z]/.test(newPw)||!/[a-z]/.test(newPw)||!/[0-9]/.test(newPw))
        { showError('s2-error','Password must contain uppercase, lowercase, and a number.'); return; }
    if (!resetToken) { showError('s2-error','No reset token found. Please start over.'); return; }

    const btn = document.getElementById('s2-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
    try {
        const r = await fetch(API+'/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: resetToken, new_password: newPw, confirm_password: confPw })
        });
        const d = await r.json();
        if (!d.success) throw new Error(d.message);
        showStep(3);
    } catch(e) {
        showError('s2-error', e.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check-circle"></i> Reset Password';
    }
}
</script>
</body></html>
